---
# Move conflicting defaults to ctrl-alt so ctrl-h/j/k/l are free
"editor_view:backspace": ctrl-alt-h
"editor_view:insert_newline": ctrl-alt-j
"editor_view:cut_all_right": ctrl-alt-k
"input:clear_screen": ctrl-alt-l
# Vim-style pane navigation
"pane_group:navigate_left": ctrl-h
"pane_group:navigate_down": ctrl-j
"pane_group:navigate_up": ctrl-k
"pane_group:navigate_right": ctrl-l
