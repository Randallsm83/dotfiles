# ============================================================================
# Scoop Buckets
# ============================================================================
# Bucket name → repository URL mapping
# Used by: install script (bucket setup), scoop export template
# Default bucket (main) is always available and not listed here

scoop_buckets:
  extras: "https://github.com/ScoopInstaller/Extras"
  versions: "https://github.com/ScoopInstaller/Versions"
  nerd-fonts: "https://github.com/matthewjberger/scoop-nerd-fonts"
  sysinternals: "https://github.com/niheaven/scoop-sysinternals"
  nonportable: "https://github.com/ScoopInstaller/Nonportable"
  games: "https://github.com/Calinou/scoop-games"
  abyss: "https://github.com/abgox/abyss"

# Apps that live outside the 'main' bucket.
# Only non-main apps need to be listed here; everything else defaults to main.
# Used by scoop-export.json.tmpl to generate a valid scoop import file.
scoop_bucket_overrides:
  extras:
    - arduino
    - bulk-crap-uninstaller
    - cpu-z
    - ddu
    - everything
    - fancontrol
    - flow-launcher
    - gpu-z
    - ilspy
    - islc
    - lazygit
    - ludusavi
    - msiafterburner
    - nvcleanstall
    - nvidia-profile-inspector
    - postman
    - rtss
    - vcredist-aio
    - ventoy
  versions:
    - steam
  nerd-fonts:
    - CascadiaCode-NF
    - FiraCode-NF
    - Hack-NF
    - JetBrainsMono-NF
  sysinternals:
    - sysinternals-suite
    - ctrl2cap
    - whois
  abyss:
    - abgox.PSCompletions
    - kelleyma49.PSFzf
    - PowerShell.PSReadLine

# Always-installed packages (not controlled by feature flags)
always_install:
  scoop:
    - chezmoi
    - jq
    - yq
    - make
    - 7zip
    - unzip
    - gzip
    - gsudo
    - aria2
    - cacert
    - innounp
    - dark
    - scoop-search
    - sudo

  winget: []

  brew:
    - jq
    - less
    - yq
    - lazygit
    - wget
    - tealdeer

  pacman:
    - re2c

  apt: []
  dnf: []

  mise:
    - aqua:jdx/usage
    - zig

  mise_unix:
    - cargo-binstall
    - chezmoi

# Remote machine package sets
# When is_remote=true and remote_minimal=true, only install essential tools
remote_packages:
  # Minimal set for remote servers (no sudo required)
  minimal:
    runtimes:
      - node     # JavaScript runtime
      - python   # Python runtime
      - go       # Go runtime
    tools:
      - direnv   # Per-directory environment
      - fzf      # Fuzzy finder
      - ripgrep  # Fast grep
      - fd       # Fast find
      - bat      # Cat with syntax highlighting
      - delta    # Git diff viewer
      - neovim   # Text editor

  # Full set for remote workstations (with sudo)
  full:
    runtimes:
      - node
      - python
      - ruby
      - go
      - rust
    tools:
      - direnv
      - fzf
      - ripgrep
      - fd
      - bat
      - eza
      - delta
      - starship
      - zoxide
      - neovim
      - sqlite

